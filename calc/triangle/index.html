<!DOCTYPE html>
<html>
    <head>
        <title>Triangle Solver</title>
    </head>
    <body>

        <div class="inputGrid">
            <div class="field">
                <label for="a">Side a</label>
                <input id="a" type="number" min="0" step="any" placeholder="67" />
            </div>
            <div class="field">
                <label for="b">Side b</label>
                <input id="b" type="number" min="0" step="any" placeholder="67" />
            </div>
            <div class="field">
                <label for="c">Side c</label>
                <input id="c" type="number" min="0" step="any" placeholder="67" />
            </div>
            <div class="field">
                <label for="A">Angle A</label>
                <input id="A" type="number" min="0" step="any" placeholder="67" />
            </div>
            <div class="field">
                <label for="B">Angle B</label>
                <input id="B" type="number" min="0" step="any" placeholder="67" />
            </div>
            <div class="field">
                <label for="C">Angle C</label>
                <input id="C" type="number" min="0" step="any" placeholder="67" />
            </div>
        </div>

        <script src="./triangle.js"></script>
    </body>
</html>
